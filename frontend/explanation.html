<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explanation Engine</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="page">
    <nav class="top-nav">
      <a href="/">Dashboard</a>
      <a href="/page/monitoring">Monitoring</a>
      <a href="/page/anomaly">Anomaly</a>
      <a href="/page/prediction">Prediction</a>
      <a href="/page/visualization">Visualization</a>
    </nav>

    <section class="sub-hero">
      <div>
        <p class="eyebrow">Feature Workspace</p>
        <h1>Explanation Engine</h1>
        <p class="lead">See the reasoning behind the alert and inspect the exact API response payload.</p>
      </div>
      <div class="hero-actions">
        <button id="refresh-btn" class="btn btn-primary">Refresh Explanation</button>
      </div>
    </section>

    <section class="dashboard-grid secondary-grid">
      <article class="panel insight-panel">
        <div class="panel-head">
          <div>
            <span class="label">Reasoning</span>
            <h3>Why This State Was Flagged</h3>
          </div>
        </div>
        <div class="insight-stack">
          <div class="insight-row">
            <span class="label-inline">Reason</span>
            <span id="reason-value">Waiting for data...</span>
          </div>
          <div class="insight-row">
            <span class="label-inline">Anomaly</span>
            <span id="anomaly-value" class="pill">--</span>
          </div>
          <div class="insight-row">
            <span class="label-inline">Timestamp</span>
            <span id="timestamp-value">--</span>
          </div>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <span class="label">Raw Output</span>
            <h3>Latest API Response</h3>
          </div>
        </div>
        <pre id="json-output">{}</pre>
      </article>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
